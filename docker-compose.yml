services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
    volumes:
      - /media/storage/ShareMe/media:/media
      - /media/Crucial-6X/ShareMe/media:/media6x
      - /home/shared/jellyfin/cache:/cache
      - /home/shared/jellyfin/config:/config
  redis:
    image: redis:7-alpine
    container_name: pixtor-redis
    ports:
      - "6379:6379"
    volumes:
      - /home/shared/pixtor/docker-data/redis:/data
    restart: always

  mongodb:
    image: mongo:6-jammy
    container_name: pixtor-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: pixtor
    ports:
      - "27017:27017"
    volumes:
      - /home/shared/pixtor/scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - /home/shared/pixtor/docker-data/mongodb:/data/db
    restart: always

  mysql:
    image: mysql:8
    container_name: pixtor-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - /home/shared/pixtor/scripts/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - /home/shared/pixtor/docker-data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s
    restart: always

  qdrant-primary:
    image: qdrant/qdrant:latest
    container_name: pixtor-qdrant-primary
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /home/shared/pixtor/docker-data/qdrant-primary:/qdrant/storage
    restart: always

  qdrant-secondary:
    image: qdrant/qdrant:latest
    container_name: pixtor-qdrant-secondary
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - /home/shared/pixtor/docker-data/qdrant-secondary:/qdrant/storage
    restart: always
  pixtor-app:
    build:
      context: .
      dockerfile: dockerfile
    image: amitkshirsagar13/pixtor:local
    container_name: pixtor-app
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - /media/data/xos:/media/storage
      - /home/shared/pixtor/ui:/home/kira/.pixtor/ui
      - /home/shared/pixtor/conf/pixtor.yml:/home/kira/conf/pixtor.yml:ro
    depends_on:
      redis:
        condition: service_started
      mongodb:
        condition: service_started
      mysql:
        condition: service_healthy
      qdrant-primary:
        condition: service_started
      qdrant-secondary:
        condition: service_started
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://root:rootpassword@mongodb:27017/pixtor?authSource=admin
      - PIXTOR_HOME=/home/kira/.pixtor
    # Required for Flatpak to run inside a container
    privileged: true
    user: kira
    restart: always
